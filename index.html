<section class="card top-list" id="list"><div class="toolbar"><h2 class="section-title">唱片列表</h2><div class="tools"><button class="btn primary" id="newBtn">新增唱片</button><button class="btn" id="exportCsv">导出 CSV</button><button class="btn" id="exportJson">导出 JSON</button><button class="btn danger" id="clear">清空全部</button></div></div><div class="filters"><input id="search" placeholder="搜索标题、艺术家、版本、备注..."><select id="formatFilter"></select><select id="sortBy"><option value="title">按标题排序</option><option value="artist">按艺术家排序</option><option value="year">按年份排序</option><option value="format">按格式排序</option><option value="label">按厂牌排序</option><option value="purchaseDate">按购入日期排序</option></select><select id="viewMode"><option value="grid" selected>简易封面视图</option><option value="detail">详细列表视图</option></select><select id="pageSize"><option value="all" selected>全部显示</option><option value="24">每页 24 张</option><option value="48">每页 48 张</option><option value="96">每页 96 张</option></select><button class="btn" id="sortDir">升序 ↑</button></div><div class="tablewrap"><table><thead><tr><th>封面</th><th>专辑信息</th><th>收藏信息</th><th>备注</th><th style="text-align:right">操作</th></tr></thead><tbody id="tbody"></tbody></table></div><div id="albumGrid" class="albumgrid"></div><div class="pager" id="pager"><button class="btn" id="prevPage">上一页</button><span id="pageInfo">第 1 / 1 页</span><button class="btn" id="nextPage">下一页</button></div></section>

<section class="stack"><div class="card" id="editor"><h2 class="section-title" id="form-title">➕ 新增唱片</h2><form id="form"><div class="formgrid"><label class="field"><span>专辑名称 *</span><input id="title" required></label><label class="field"><span>艺术家 *</span><input id="artist" required></label><label class="field"><span>年份</span><input id="year"></label><label class="field"><span>流派</span><input id="genre"></label><label class="field"><span>厂牌</span><input id="label"></label><label class="field"><span>格式</span><select id="format"></select></label><label class="field"><span>碟片数</span><input id="discs" type="number" min="1" value="1"></label><label class="field"><span>成色</span><select id="condition"></select></label><label class="field"><span>语言</span><input id="language"></label><label class="field"><span>版本</span><input id="country" placeholder="例如：日版 / 美版 / 港版 / 首版 / 重制版"></label><label class="field"><span>购买日期</span><input id="purchaseDate" type="date"></label><label class="field"><span>购买价格</span><input id="purchasePrice" type="number" step="0.01"></label><label class="field"><span>封面图片链接</span><input id="coverUrl"></label><label class="field full"><span>备注</span><textarea id="notes"></textarea></label></div><div class="actions"><button class="btn primary" id="submit">新增唱片</button><button type="button" class="btn" id="reset">清空表单 / 新增模式</button><button type="button" class="btn danger hidden" id="deleteCurrent">删除当前唱片</button></div></form></div>
<div class="card" id="io"><h2 class="section-title">导入 / 导出</h2><div class="import"><div><b>导入模式</b><select id="importMode"><option value="merge">合并导入</option><option value="replace">覆盖导入</option></select></div><div><b>导入文件</b><div class="tools" style="margin-top:6px"><label class="btn" for="importFile">导入 XLSX / CSV / JSON</label><input hidden id="importFile" type="file" accept=".xlsx,.csv,.json"><span class="hint" id="fileName">尚未选择文件</span></div><div class="hint">支持表头：标题/专辑名称/title、艺术家/artist、年份/year、格式/format、版本/version/country/region、封面链接/coverUrl 等。</div></div></div><div class="actions"><button class="btn" id="tpl">下载导入模板 CSV</button><button class="btn" onclick="document.getElementById('exportCsv').click()">导出 CSV</button><button class="btn" onclick="document.getElementById('exportJson').click()">导出 JSON</button></div><div class="foot">GitHub Pages 版：数据保存在当前浏览器 localStorage。建议定期导出 JSON 备份。</div></div></section></div>
<nav class="native-panel mobile-nav"><div class="native-panel-inner"><button class="navbtn" data-to="top"><b>⌂</b>首页</button><button class="navbtn" data-to="list"><b>▦</b>列表</button><button class="navbtn" data-to="new"><b>＋</b>新增</button><button class="navbtn" data-to="io"><b>⇅</b>导入</button></div></nav>
<script>
const KEY='record-collection-app-offline-v3',FORMATS=['CD','SACD','Vinyl','黑胶','磁带','Blu-spec CD','DVD-Audio','Box Set','其他'],CONDS=['全新','近新','良好','一般','较差'];
const empty={id:'',title:'',artist:'',albumArtist:'',year:'',genre:'',label:'',catalogNumber:'',format:'CD',discs:'1',condition:'良好',language:'',country:'',location:'',purchaseDate:'',purchasePrice:'',notes:'',coverUrl:''};
const aliases={title:['title','标题','专辑名称','专辑名','album','album title','name'],artist:['artist','艺术家','歌手','演唱者'],year:['year','年份','发行年份'],genre:['genre','流派','风格','类型'],label:['label','厂牌','唱片公司'],format:['format','格式','介质'],discs:['discs','disc','碟片数','张数','盘数'],condition:['condition','成色','品相','状态'],language:['language','语言'],country:['country','region','version','版本','版别','发行版本','国家','国家/地区','地区'],purchaseDate:['purchasedate','purchase date','购买日期','购入日期'],purchasePrice:['purchaseprice','purchase price','price','购买价格','购入价格','价格'],notes:['notes','note','remark','remarks','备注','说明'],coverUrl:['coverurl','cover url','cover','image','image url','封面链接','封面','图片链接'],id:['id','记录id']};
let records=[],editingId=null,sortDir='asc',page=1;const $=id=>document.getElementById(id);const ids=Object.keys(empty);function h(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}function uid(){return Date.now()+'-'+Math.random().toString(36).slice(2,8)}function msg(t,w=false){$('msg').textContent=t;$('msg').className='msg '+(w?'warn':'ok');clearTimeout(msg.t);msg.t=setTimeout(()=>$('msg').className='msg',3200)}function save(){localStorage.setItem(KEY,JSON.stringify(records))}function load(){try{records=(JSON.parse(localStorage.getItem(KEY)||'[]')||[]).map(x=>({...empty,...x,id:String(x.id||uid())}))}catch(e){records=[]}}
function fillSel(id,a,all){$(id).innerHTML=(all?'<option value="全部">全部格式</option>':'')+a.map(x=>'<option value="'+h(x)+'">'+h(x)+'</option>').join('')}function fd(){let r={...empty};ids.forEach(k=>{if($(k))r[k]=$(k).value?.trim?.()??''});r.id=editingId||'';r.discs=r.discs||'1';return r}function fill(r){ids.forEach(k=>{if($(k))$(k).value=r[k]??empty[k]})}function setModeEditing(on){$('deleteCurrent').classList.toggle('hidden',!on);$('form-title').textContent=on?'✏️ 编辑唱片':'➕ 新增唱片';$('submit').textContent=on?'保存修改':'新增唱片'}function reset(){editingId=null;fill(empty);setModeEditing(false)}function scrollToEl(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'})}function scrollForm(){scrollToEl('editor')}
function norm(s){return String(s??'').trim().toLowerCase().replace(/\ufeff/g,'').replace(/[\s_\-\/\\：:（）()【】\[\]\.]+/g,' ').replace(/\s+/g,' ')}function field(k){let nk=norm(k);for(const [f,as] of Object.entries(aliases))for(const a of as)if(nk===norm(a))return f;return null}function nval(f,v){let s=String(v??'').trim();if(!s)return'';if(f==='format'){let x=s.toLowerCase();if(x.includes('sacd'))return'SACD';if(x.includes('vinyl')||x.includes('lp')||x.includes('黑胶'))return'黑胶';if(x.includes('cassette')||x.includes('tape')||x.includes('磁带'))return'磁带';if(x.includes('cd'))return'CD';return s}if(f==='discs')return Number(s)>0?String(Number(s)):'1';if(f==='purchasePrice')return s.replace(/[￥$,]/g,'');return s}function mapRow(row){let r={...empty};Object.entries(row||{}).forEach(([k,v])=>{let f=field(k);if(f)r[f]=nval(f,v)});r.id=String(r.id||uid());r.format=r.format||'CD';r.discs=r.discs||'1';r.condition=r.condition||'良好';return r}function sk(r){let t=String(r.title||'').toLowerCase().trim(),a=String(r.artist||'').toLowerCase().trim(),v=String(r.country||'').toLowerCase().trim();return (t||a||v)?t+'__'+a+'__'+v:''}function merge(rows){let valid=rows.map(mapRow).filter(r=>r.title||r.artist||r.country),added=0,updated=0;if($('importMode').value==='replace'){records=valid;return{added:valid.length,updated,total:records.length}}let byId=new Map(records.map(r=>[String(r.id),r])),bySk=new Map(records.map(r=>[sk(r),r]));valid.forEach(r=>{let cur=byId.get(String(r.id))||(sk(r)&&bySk.get(sk(r)));if(cur){let i=records.findIndex(x=>String(x.id)===String(cur.id));records[i]={...cur,...r,id:String(cur.id)};updated++}else{records.unshift(r);added++}});return{added,updated,total:records.length}}
function filtered(){let kw=$('search').value.trim().toLowerCase(),ff=$('formatFilter').value,sb=$('sortBy').value;let arr=records.filter(r=>(ff==='全部'||r.format===ff)&&(!kw||[r.title,r.artist,r.genre,r.label,r.year,r.notes,r.country,r.language].join(' ').toLowerCase().includes(kw)));arr.sort((a,b)=>String(a[sb]??'').localeCompare(String(b[sb]??''),'zh-Hans-CN',{numeric:true,sensitivity:'base'})*(sortDir==='asc'?1:-1));return arr}function pageList(arr){let ps=$('pageSize').value;if(ps==='all')return arr;let size=+ps,total=Math.max(1,Math.ceil(arr.length/size));if(page>total)page=total;return arr.slice((page-1)*size,page*size)}function stats(){ $('s-count').textContent=records.length;$('s-discs').textContent=records.reduce((s,r)=>s+(+r.discs||0),0);$('s-value').textContent='￥'+records.reduce((s,r)=>s+(+r.purchasePrice||0),0).toFixed(2)}function renderPager(total){let ps=$('pageSize').value,p=$('pager');if(ps==='all'){p.style.display='none';return}let size=+ps,pages=Math.max(1,Math.ceil(total/size));page=Math.min(page,pages);$('pageInfo').textContent='第 '+page+' / '+pages+' 页（共 '+total+' 张）';$('prevPage').disabled=page<=1;$('nextPage').disabled=page>=pages;p.style.display='flex'}
function render(){stats();let all=filtered(),arr=pageList(all),grid=$('viewMode').value==='grid';renderPager(all.length);document.querySelector('.tablewrap').style.display=grid?'none':'block';$('albumGrid').style.display=grid?'grid':'none';if(!arr.length){$('tbody').innerHTML='<tr><td colspan="5" class="empty">暂无记录</td></tr>';$('albumGrid').innerHTML='<div class="empty" style="grid-column:1/-1">暂无记录</div>';save();return}$('tbody').innerHTML=arr.map(r=>{let id=h(String(r.id)),cv=r.coverUrl?'<div class="cover"><img src="'+h(r.coverUrl)+'" onerror="this.parentNode.innerHTML=\'💿\'"></div>':'<div class="cover">💿</div>';return '<tr><td>'+cv+'</td><td><div class="title">'+h(r.title||'-')+'</div><div class="artist">'+h(r.artist||'-')+'</div><div class="tags">'+[r.year,r.format,r.genre,r.label,r.country].filter(Boolean).map(x=>'<span class="tag">'+h(x)+'</span>').join('')+'</div></td><td class="meta">碟片数：'+h(r.discs||'-')+'<br>成色：'+h(r.condition||'-')+'<br>版本：'+h(r.country||'-')+'<br>购入：'+h(r.purchaseDate||'-')+'<br>价格：'+(r.purchasePrice?'￥'+h(r.purchasePrice):'-')+'</td><td class="notes">'+h(r.notes||'-')+'</td><td><div class="rowact"><button class="btn edit" data-id="'+id+'">编辑</button><button class="btn danger del" data-id="'+id+'">删除</button></div></td></tr>'}).join('');$('albumGrid').innerHTML=arr.map(r=>{let id=h(String(r.id)),cv=r.coverUrl?'<div class="albumcover"><img src="'+h(r.coverUrl)+'" onerror="this.parentNode.innerHTML=\'💿\'"></div>':'<div class="albumcover">💿</div>';return '<div class="album" data-id="'+id+'" title="点击进入编辑唱片">'+cv+'<div class="gtitle">'+h(r.title||'-')+'</div><div class="gartist">'+h(r.artist||'-')+'</div></div>'}).join('');save()}
function edit(id){id=String(id);let r=records.find(x=>String(x.id)===id);if(!r){msg('未找到该记录。',true);return}editingId=id;fill(r);setModeEditing(true);scrollForm()}function del(id){id=String(id);records=records.filter(x=>String(x.id)!==id);if(String(editingId)===id)reset();render();msg('已删除唱片')}function csvEsc(v){let s=String(v??'');return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}function dl(n,c,t){let b=new Blob([c],{type:t}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u)}function exportCsv(){let head=['标题','艺术家','年份','流派','厂牌','格式','碟片数','成色','语言','版本','购买日期','购买价格','备注','封面链接','ID'];let rows=records.map(r=>[r.title,r.artist,r.year,r.genre,r.label,r.format,r.discs,r.condition,r.language,r.country,r.purchaseDate,r.purchasePrice,r.notes,r.coverUrl,r.id]);dl('唱片收藏_'+new Date().toISOString().slice(0,10)+'.csv','\ufeff'+[head,...rows].map(r=>r.map(csvEsc).join(',')).join('\n'),'text/csv;charset=utf-8')}function tpl(){let h=['标题','艺术家','年份','流派','厂牌','格式','碟片数','成色','语言','版本','购买日期','购买价格','备注','封面链接'];let row=['Kind of Blue','Miles Davis','1959','Jazz','Columbia','CD','1','良好','英语','美版','2024-08-12','89','示例',''];dl('唱片导入模板.csv','\ufeff'+[h,row].map(r=>r.map(csvEsc).join(',')).join('\n'),'text/csv;charset=utf-8')}function parseCsv(text){let rows=[],cur=[],v='',q=false;for(let i=0;i<text.length;i++){let c=text[i],n=text[i+1];if(c==='"'){if(q&&n==='"'){v+='"';i++}else q=!q}else if(!q&&(c===','||c==='\t')){cur.push(v);v=''}else if(!q&&(c==='\n'||c==='\r')){if(c==='\r'&&n==='\n')i++;cur.push(v);rows.push(cur);cur=[];v=''}else v+=c}if(v||cur.length){cur.push(v);rows.push(cur)}rows=rows.filter(r=>r.some(c=>String(c).trim()));let head=(rows.shift()||[]).map(x=>String(x).trim());return rows.map(r=>Object.fromEntries(head.map((h,i)=>[h,r[i]??''])))}async function importFile(file){if(!file)return;$('fileName').textContent=file.name;try{let n=file.name.toLowerCase(),rows;if(n.endsWith('.json'))rows=JSON.parse(await file.text());else if(n.endsWith('.csv'))rows=parseCsv((await file.text()).replace(/^\ufeff/,''));else{msg('GitHub Pages最终版建议导入 CSV / JSON；XLSX 可先另存为 CSV。',true);return}let r=merge(rows);page=1;render();reset();msg('导入完成：新增 '+r.added+' 条，更新 '+r.updated+' 条，当前共 '+r.total+' 条。')}catch(e){console.error(e);msg('导入失败：'+(e.message||'请检查文件格式'),true)}}function init(){fillSel('format',FORMATS);fillSel('condition',CONDS);fillSel('formatFilter',FORMATS,true);$('viewMode').value='grid';load();render();$('form').onsubmit=e=>{e.preventDefault();let r=fd();if(!r.title||!r.artist){msg('请至少填写专辑名称和艺术家',true);return}if(editingId){r.id=String(editingId);records=records.map(x=>String(x.id)===String(editingId)?r:x);msg('唱片信息已更新')}else{r.id=uid();records.unshift(r);msg('已新增唱片')}reset();render()};$('reset').onclick=reset;$('newBtn').onclick=()=>{reset();scrollForm()};$('topBtn').onclick=()=>scrollTo({top:0,behavior:'smooth'});$('deleteCurrent').onclick=()=>{if(!editingId)return;if(confirm('确定删除当前唱片吗？此操作不可撤销。'))del(editingId)};$('tpl').onclick=tpl;$('exportCsv').onclick=exportCsv;$('exportJson').onclick=()=>dl('唱片收藏_'+new Date().toISOString().slice(0,10)+'.json',JSON.stringify(records,null,2),'application/json;charset=utf-8');$('clear').onclick=()=>{if(confirm('确定清空全部数据吗？建议先导出 JSON 备份。')){records=[];reset();render();msg('已清空')}};['search','formatFilter','sortBy','viewMode','pageSize'].forEach(id=>$(id).addEventListener('input',()=>{page=1;render()}));$('prevPage').onclick=()=>{page=Math.max(1,page-1);render();scrollToEl('list')};$('nextPage').onclick=()=>{page+=1;render();scrollToEl('list')};$('sortDir').onclick=()=>{sortDir=sortDir==='asc'?'desc':'asc';$('sortDir').textContent=sortDir==='asc'?'升序 ↑':'降序 ↓';page=1;render()};$('importFile').onchange=e=>{importFile(e.target.files[0]);e.target.value=''};document.body.addEventListener('click',e=>{let b=e.target.closest('button');if(b?.classList.contains('edit'))edit(b.dataset.id);if(b?.classList.contains('del'))del(b.dataset.id);let card=e.target.closest('.album');if(card&&!b)edit(card.dataset.id);let nav=e.target.closest('.navbtn');if(nav){let to=nav.dataset.to;if(to==='new'){reset();scrollForm()}else scrollToEl(to)}})}init();
</script></body></html>
